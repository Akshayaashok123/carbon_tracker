# render.yaml — Render Blueprint for EcoTracker
# Deploy with: render blueprint apply
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ecotracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ecotracker-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OLA_MAPS_KEY
        sync: false
      - key: STRAVA_CLIENT_ID
        sync: false
      - key: STRAVA_CLIENT_SECRET
        sync: false
      - key: STRAVA_REDIRECT_URI
        sync: false
    healthCheckPath: /api/health

databases:
  - name: ecotracker-db
    plan: free
    databaseName: ecotracker
    ipAllowList: []
